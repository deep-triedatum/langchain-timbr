name: Install Dependencies and Run Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  IS_GITHUB_ACTIONS: ${{ secrets.IS_GITHUB_ACTIONS }}
  TIMBR_URL: ${{ secrets.TIMBR_URL }}
  TIMBR_TOKEN: ${{ secrets.TIMBR_TOKEN }}
  TIMBR_ONTOLOGY_NO_DTIMBR_PERMS: ${{ secrets.TIMBR_ONTOLOGY_NO_DTIMBR_PERMS }}
  TIMBR_TOKEN_NO_DTIMBR_PERMS: ${{ secrets.TIMBR_TOKEN_NO_DTIMBR_PERMS }}
  LLM_TYPE: ${{ secrets.LLM_TYPE }}
  LLM_MODEL: ${{ secrets.LLM_MODEL }}
  LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
  JWT_TIMBR_URL: ${{ secrets.JWT_TIMBR_URL }}
  JWT_TIMBR_ONTOLOGY: ${{ secrets.JWT_TIMBR_ONTOLOGY }}
  JWT_TENANT_ID: ${{ secrets.JWT_TENANT_ID }}
  JWT_CLIENT_ID: ${{ secrets.JWT_CLIENT_ID }}
  JWT_USERNAME: ${{ secrets.JWT_USERNAME }}
  JWT_PASSWORD: ${{ secrets.JWT_PASSWORD }}
  JWT_SCOPE: ${{ secrets.JWT_SCOPE }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  LLM_TIMEOUT: ${{ secrets.LLM_TIMEOUT }}

jobs:
  test-python-310:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run tests
      run: |
        python -m pytest tests/standard -v --reruns 3 --maxfail 1 --disable-warnings -q

  test-python-311:
    runs-on: ubuntu-latest
    needs: test-python-310
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run tests
      run: |
        python -m pytest tests/standard -v --maxfail 1 --reruns 3 --disable-warnings -q

  test-python-312:
    runs-on: ubuntu-latest
    needs: test-python-311
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run tests
      run: |
        python -m pytest tests/standard -v --reruns 3 --maxfail 1 --disable-warnings -q

  test-python-313:
    runs-on: ubuntu-latest
    needs: test-python-312
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements313.txt
        
    - name: Run tests
      run: |
        python -m pytest tests/standard -v --reruns 3 --maxfail 1 --disable-warnings -q
